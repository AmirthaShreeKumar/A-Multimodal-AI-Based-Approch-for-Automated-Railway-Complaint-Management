<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0c1929" />
    <title>{% block title %}RailMadad{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
      <a href="{{ url_for('home') }}" class="brand" aria-label="RailMadad home">
        <span class="brand-mark" aria-hidden="true">
          <svg width="36" height="36" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="18" width="32" height="10" rx="2" fill="currentColor" opacity="0.9" />
            <rect x="8" y="12" width="24" height="8" rx="2" fill="currentColor" />
            <circle cx="11" cy="31" r="3" fill="currentColor" opacity="0.7" />
            <circle cx="20" cy="31" r="3" fill="currentColor" opacity="0.7" />
            <circle cx="29" cy="31" r="3" fill="currentColor" opacity="0.7" />
            <path d="M4 14h32" stroke="currentColor" stroke-width="1.5" opacity="0.4" />
          </svg>
        </span>
        <span class="brand-word">
          <span class="brand-name">RailMadad</span>
          <span class="brand-sub">Grievance redressal</span>
        </span>
      </a>
      </div>
    </header>

    <main class="wrap">{% block content %}{% endblock %}</main>

    <footer class="app-footer">
      <p>RailMadad · AI-assisted classification for passenger feedback · For demonstration</p>
    </footer>
  </body>
</html>
